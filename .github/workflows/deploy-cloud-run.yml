# ============================================
# AD FUSION - GitHub Actions CI/CD
# Build, Test, Deploy to Google Cloud Run
# ============================================
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID        - Google Cloud project ID
#   GCP_SA_KEY            - Service account JSON key (base64 encoded)
#   GCP_REGION            - Deployment region (default: us-central1)
#   CLOUD_SQL_INSTANCE    - Cloud SQL connection string (project:region:instance)
#
# The service account needs these roles:
#   - Cloud Run Admin
#   - Cloud Build Editor
#   - Artifact Registry Writer (or Container Registry access)
#   - Secret Manager Secret Accessor
#   - Cloud SQL Client
#   - Service Account User

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SERVICE_NAME: adfusion
  WORKER_NAME: adfusion-worker
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  IMAGE_REGISTRY: gcr.io

jobs:
  # ============================================
  # Job 1: Test
  # ============================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true  # strict mode not enabled

      - name: Run tests
        run: npm test

  # ============================================
  # Job 2: Build & Push Docker Image
  # ============================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | head -c 7)
          IMAGE="${{ env.IMAGE_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tags=${IMAGE}:${SHORT_SHA},${IMAGE}:latest" >> $GITHUB_OUTPUT
          echo "sha_tag=${IMAGE}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.sha_tag }} \
            -t ${{ env.IMAGE_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest \
            --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg GIT_SHA=${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.meta.outputs.sha_tag }}
          docker push ${{ env.IMAGE_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest

  # ============================================
  # Job 3: Deploy Main App to Cloud Run
  # ============================================
  deploy-app:
    name: Deploy App to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy main app to Cloud Run
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | head -c 7)
          IMAGE="${{ env.IMAGE_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${SHORT_SHA}"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${IMAGE}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 10 \
            --concurrency 80 \
            --timeout 300 \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production,PORT=3000" \
            --set-secrets "DATABASE_URL=adfusion-db-url:latest,REDIS_URL=adfusion-redis-url:latest,JWT_SECRET=adfusion-jwt-secret:latest,OPENAI_API_KEY=adfusion-openai-key:latest,META_APP_ID=adfusion-meta-app-id:latest,META_APP_SECRET=adfusion-meta-app-secret:latest,STRIPE_SECRET_KEY=adfusion-stripe-key:latest,ENCRYPTION_KEY=adfusion-encryption-key:latest" \
            --add-cloudsql-instances "${{ secrets.CLOUD_SQL_INSTANCE }}"

      - name: Get service URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)")
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "## Deployment Successful :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "**App URL:** ${URL}" >> $GITHUB_STEP_SUMMARY
          echo "**Health:** ${URL}/api/health" >> $GITHUB_STEP_SUMMARY

      - name: Smoke test
        run: |
          URL=${{ steps.url.outputs.url }}
          echo "Testing ${URL}/api/health..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/api/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "WARNING: Health check did not return 200 after 5 attempts"
          exit 1

  # ============================================
  # Job 4: Deploy Background Worker
  # ============================================
  deploy-worker:
    name: Deploy Worker to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy worker to Cloud Run
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | head -c 7)
          IMAGE="${{ env.IMAGE_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${SHORT_SHA}"

          gcloud run deploy ${{ env.WORKER_NAME }} \
            --image "${IMAGE}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 3 \
            --no-allow-unauthenticated \
            --command "node" \
            --args "dist/jobs/runner.js" \
            --set-env-vars "NODE_ENV=production" \
            --set-secrets "DATABASE_URL=adfusion-db-url:latest,REDIS_URL=adfusion-redis-url:latest,OPENAI_API_KEY=adfusion-openai-key:latest,META_APP_ID=adfusion-meta-app-id:latest,META_APP_SECRET=adfusion-meta-app-secret:latest,ENCRYPTION_KEY=adfusion-encryption-key:latest" \
            --add-cloudsql-instances "${{ secrets.CLOUD_SQL_INSTANCE }}"

      - name: Deployment summary
        run: |
          echo "## Worker Deployed :gear:" >> $GITHUB_STEP_SUMMARY
          echo "Worker service **${{ env.WORKER_NAME }}** updated in **${{ env.REGION }}**" >> $GITHUB_STEP_SUMMARY
