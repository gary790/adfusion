# ============================================
# AD FUSION - Google Cloud Build
# Build + Deploy to Cloud Run
# ============================================
# Trigger: Push to main branch
# Usage: gcloud builds submit --config cloudbuild.yaml \
#          --substitutions=_REGION=us-central1,_CLOUD_SQL_INSTANCE=project:region:instance

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/adfusion:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/adfusion:latest'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/adfusion:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/adfusion:latest'

  # Step 3: Run database migrations via Cloud SQL Proxy
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=== Database Migrations ==="
        echo "Migrations are applied automatically on first launch."
        echo "For manual migration, use Cloud SQL Proxy + psql:"
        echo "  cloud-sql-proxy ${_CLOUD_SQL_INSTANCE} --port 5433"
        echo "  psql -h localhost -p 5433 -U adfusion -d adfusion -f migrations/001_initial_schema.sql"
        echo "  psql -h localhost -p 5433 -U adfusion -d adfusion -f migrations/002_world_class_upgrade.sql"

  # Step 4: Deploy to Cloud Run (main app)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'adfusion'
      - '--image'
      - 'gcr.io/$PROJECT_ID/adfusion:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '300'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production,PORT=3000'
      - '--set-secrets'
      - 'DATABASE_URL=adfusion-db-url:latest,REDIS_URL=adfusion-redis-url:latest,JWT_SECRET=adfusion-jwt-secret:latest,OPENAI_API_KEY=adfusion-openai-key:latest,META_APP_ID=adfusion-meta-app-id:latest,META_APP_SECRET=adfusion-meta-app-secret:latest,STRIPE_SECRET_KEY=adfusion-stripe-key:latest,ENCRYPTION_KEY=adfusion-encryption-key:latest'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_INSTANCE}'

  # Step 5: Deploy worker (background jobs) to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'adfusion-worker'
      - '--image'
      - 'gcr.io/$PROJECT_ID/adfusion:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '3'
      - '--no-allow-unauthenticated'
      - '--command'
      - 'node'
      - '--args'
      - 'dist/jobs/runner.js'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--set-secrets'
      - 'DATABASE_URL=adfusion-db-url:latest,REDIS_URL=adfusion-redis-url:latest,OPENAI_API_KEY=adfusion-openai-key:latest,META_APP_ID=adfusion-meta-app-id:latest,META_APP_SECRET=adfusion-meta-app-secret:latest,ENCRYPTION_KEY=adfusion-encryption-key:latest'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_INSTANCE}'

substitutions:
  _REGION: us-central1
  _CLOUD_SQL_INSTANCE: ''

images:
  - 'gcr.io/$PROJECT_ID/adfusion:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/adfusion:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
