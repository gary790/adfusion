<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Fusion — AI-Powered Meta Ad Optimizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
            meta: { blue:'#1877f2', dark:'#166fe5' },
          },
        },
      },
    };
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .gradient-brand { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.15); }
    .sidebar-link { transition: all 0.15s ease; border-left: 3px solid transparent; }
    .sidebar-link:hover, .sidebar-link.active { background: rgba(99,102,241,0.08); color: #4f46e5; }
    .sidebar-link.active { border-left-color: #4f46e5; font-weight: 600; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; animation: skeleton 1.5s ease infinite; }
    @keyframes skeleton { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }
    .badge { display:inline-flex; align-items:center; padding:2px 10px; border-radius:9999px; font-size:0.75rem; font-weight:600; }
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; transform:translateY(120%); transition:transform 0.3s ease; }
    .toast.show { transform:translateY(0); }
    .metric-card { position:relative; overflow:hidden; }
    .metric-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
    .metric-card.green::before { background: #22c55e; }
    .metric-card.red::before { background: #ef4444; }
    .metric-card.blue::before { background: #3b82f6; }
    .metric-card.purple::before { background: #8b5cf6; }
    .metric-card.amber::before { background: #f59e0b; }
    .metric-card.indigo::before { background: #6366f1; }
  </style>
</head>
<body class="h-full bg-gray-50 font-sans antialiased text-gray-800">

<!-- Toast Notification -->
<div id="toast" class="toast">
  <div class="flex items-center gap-3 px-5 py-3 bg-white shadow-xl rounded-xl border border-gray-100">
    <i id="toast-icon" class="fas fa-check-circle text-green-500 text-lg"></i>
    <span id="toast-text" class="text-sm font-medium text-gray-700"></span>
  </div>
</div>

<!-- App Root -->
<div id="app"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
