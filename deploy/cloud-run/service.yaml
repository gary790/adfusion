# ============================================
# AD FUSION - Cloud Run Service (standalone)
# Deploy: gcloud run deploy adfusion --source .
# ============================================

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: adfusion
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '1'
        autoscaling.knative.dev/maxScale: '10'
        run.googleapis.com/cpu-throttling: 'false'
        run.googleapis.com/startup-cpu-boost: 'true'
        run.googleapis.com/cloudsql-instances: 'PROJECT_ID:REGION:INSTANCE_NAME'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: adfusion-sa@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: gcr.io/PROJECT_ID/adfusion:latest
          ports:
            - name: http1
              containerPort: 3000
          resources:
            limits:
              cpu: '1'
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '3000'
            # Secrets from Google Secret Manager
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: adfusion-db-url
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: adfusion-redis-url
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: adfusion-jwt-secret
                  key: latest
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: adfusion-openai-key
                  key: latest
            - name: META_APP_ID
              valueFrom:
                secretKeyRef:
                  name: adfusion-meta-app-id
                  key: latest
            - name: META_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: adfusion-meta-app-secret
                  key: latest
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: adfusion-stripe-key
                  key: latest
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: adfusion-encryption-key
                  key: latest
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 15
